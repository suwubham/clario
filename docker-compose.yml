version: '3.8'

services:
  backend:
    build:
      context: ./clario-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENV: production
      ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000"
    env_file:
      - ./clario-backend/.env
    restart: unless-stopped
    networks:
      - clario-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./clario-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_BASE_URL: "http://backend:8000"
    env_file:
      - ./clario-frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clario-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  clario-network:
    driver: bridge
